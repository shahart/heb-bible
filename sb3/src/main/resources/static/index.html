<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>psukim</title>
</head>
<body>
<!--integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js" onerror="alert('No internet!')"></script>
<script>
    function csrfToken() {
        var match = document.cookie.match(new RegExp('(^| )XSRF-TOKEN=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
    }

    $.ajaxSetup({
        beforeSend: function(xhr, settings) {
            var token = csrfToken();
            if (token && !/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) {
                xhr.setRequestHeader('X-XSRF-TOKEN', token);
            }
        }
    });

    $(function() {
        $.ajax({
            url: "/user",
            success: function(data) {
                $('.user').text('Signed in as ' + (data.email || data.name));
            }
        });

        $.ajax({
            url: "/psukim",
            success: function(data) {
                console.debug(data);
                $('.count').append(data);
            }
        });
    });

    function pasuk() {
        if (document.getElementById('text').value.length <= 1) {
            alert('no input');
        }
        else {
            $.post({
                url: "/psukim",
                success: function (data) {
                    console.debug(data.length);
                    $('.result').append('Psukim per name: ' + data.length); // TODO replace
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {
                    alert("Status: " + textStatus + " Error: " + errorThrown);
                },
                data: document.getElementById('text').value,
                contentType: 'text/plain'
            });
        }
    }

    function dilugim() {
        var skipMin = Math.ceil(document.getElementById("skipMin").value);
        var skipMax = Math.ceil(document.getElementById("skipMax").value);
        $.post({
            url: "/dilugim?skipMin=" + skipMin + "&skipMax=" + skipMax,
            success: function(data) {
                console.debug(data);
                $('.dilugimResult').append('Dilugim per name: ' + data);
            },
            error: function(XMLHttpRequest, textStatus, errorThrown) {
                alert("Status: " + textStatus + " Error: " + errorThrown);
            },
            contentType : 'text/plain',
            data: document.getElementById('dilugimTxt').value
        });
    }
</script>
<div>
    <span class="user"></span>
    <form action="/logout" method="post">
        <button type="submit">Logout</button>
    </form>
</div>
<a href="/swagger-ui/index.html">Swagger</a>
<div>
    <p class="count">Total Count is </p>
</div>
<input type="text" id="text" value="">
<button onclick="pasuk()">Find my Pasuk</button>
<div>
    <p class="result"></p>
</div>
</br>
<input type="text" id="dilugimTxt" value="">
<button onclick="dilugim()">Dilugim</button>
from <input type="number" id="skipMin" value="1" min="1" max="9999"/>
to <input type="number" id="skipMax" value="100" min="1" max="9999">
<div>
    <p class="dilugimResult"></p>
</div>
</body>
</html>
